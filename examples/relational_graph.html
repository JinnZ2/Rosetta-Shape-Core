// ── COLORS ────────────────────────────────────────────────────────
const NS_COLORS = {
  ANIMAL: '#ff9e64', PLANT: '#7eff8b', MICROBE: '#c97bff', CRYSTAL: '#4ad4ff',
  GEOM: '#ff7eb3', FIELD: '#ffd97b', STRUCT: '#aaa', CONST: '#fff',
  SHAPE: '#4a9eff', FAMILY: '#22ccaa', BRIDGE: '#ff6b6b', EQUATION: '#ffaa33',
};
const SHAPE_COLORS = {
  'SHAPE.TETRA': '#ff5555', 'SHAPE.CUBE': '#5588ff', 'SHAPE.OCTA': '#55aaff',
  'SHAPE.DODECA': '#55cc88', 'SHAPE.ICOSA': '#ffaa33',
};

// ── NODE / EDGE STRUCTURES ────────────────────────────────────────
let nodes = [], edges = [], nodeMap = {};

function addNode(id, label, layer, extra) {
  if (nodeMap[id]) return nodeMap[id];
  const ns = id.split('.')[0];
  const n = {
    id, label: label || id, layer,
    x: (Math.random() - 0.5) * 600,
    y: (Math.random() - 0.5) * 600,
    vx: 0, vy: 0,
    r: layer === 'shapes' ? 18 : layer === 'families' ? 12 : layer === 'bridges' ? 10 : layer === 'equations' ? 8 : 6,
    color: SHAPE_COLORS[id] || NS_COLORS[ns] || NS_COLORS[layer.toUpperCase()] || '#888',
    pinned: false,
    ...extra,
  };
  nodes.push(n);
  nodeMap[id] = n;
  return n;
}

function addEdge(src, tgt, layer, label, color) {
  if (!nodeMap[src] || !nodeMap[tgt]) return;
  edges.push({ src, tgt, layer, label: label || '', color: color || '#333' });
}

// ── BUILD GRAPH FROM DATA ─────────────────────────────────────────
function buildGraph(data) {
  nodes = []; edges = []; nodeMap = {};

  // Shapes (hubs)
  for (const [sid, prof] of Object.entries(data.shapes)) {
    addNode(sid, prof.name || sid, 'shapes', { detail: (prof.qualitative || []).join(', ') });
  }

  // Families
  for (const [fid, fam] of Object.entries(data.families)) {
    addNode(fid, fam.name || fid, 'families', { detail: `Primary: ${fam.primary || '?'}` });
    // family → primary shape
    if (fam.primary && nodeMap[fam.primary]) {
      addEdge(fid, fam.primary, 'families', 'primary', '#22ccaa88');
    }
    // family → merged shapes
    for (const ms of (fam.merged || [])) {
      if (nodeMap[ms]) addEdge(fid, ms, 'families', 'merged', '#22ccaa44');
    }
  }

  // Entities
  for (const ent of data.entities) {
    const n = addNode(ent.id, ent.label, 'entities', {
      detail: ent.pattern || '',
      families: ent.families || [],
    });
    // entity → families
    for (const fid of (ent.families || [])) {
      if (nodeMap[fid]) addEdge(ent.id, fid, 'entities', '', '#ffffff18');
    }
  }

  // Entity direct links
  for (const link of data.entity_links) {
    addEdge(link.from, link.to, 'links', link.rel, '#ffffff22');
  }

  // Rules
  for (const rule of data.rules) {
    for (let i = 0; i < rule.inputs.length; i++) {
      for (let j = i + 1; j < rule.inputs.length; j++) {
        if (nodeMap[rule.inputs[i]] && nodeMap[rule.inputs[j]]) {
          addEdge(rule.inputs[i], rule.inputs[j], 'rules', rule.emergent, '#ffaa3344');
        }
      }
    }
  }

  // Bridges
  for (const br of data.bridges) {
    const bn = addNode(br.id, br.name, 'bridges', { detail: br.description || '' });
    // bridge cross-connections
    for (const conn of (br.connections || [])) {
      if (conn.target_bridge && nodeMap[conn.target_bridge]) {
        addEdge(br.id, conn.target_bridge, 'bridges', conn.connection || '', '#ff6b6b66');
      }
    }
  }

  // Economic equations
  for (const eq of data.equations) {
    addNode(eq.id, eq.name, 'equations', { detail: eq.measures });
    for (const fid of (eq.families || [])) {
      if (nodeMap[fid]) addEdge(eq.id, fid, 'equations', 'measures via', '#ffaa3355');
    }
  }

  // Update stats
  document.getElementById('st-entities').textContent = data.entities.length;
  document.getElementById('st-shapes').textContent = Object.keys(data.shapes).length;
  document.getElementById('st-families').textContent = Object.keys(data.families).length;
  document.getElementById('st-bridges').textContent = data.bridges.length;
  document.getElementById('st-equations').textContent = data.equations.length;
  document.getElementById('st-edges').textContent = edges.length;
}

// ── PHYSICS ───────────────────────────────────────────────────────
function tick() {
  const N = nodes.length;
  const alpha = 0.3;
  const repulsion = 1200;
  const attraction = 0.004;
  const damping = 0.85;
  const linkDist = 80;

  // Repulsion (Barnes-Hut simplified: just skip far nodes)
  for (let i = 0; i < N; i++) {
    const a = nodes[i];
    if (!isVisible(a)) continue;
    for (let j = i + 1; j < N; j++) {
      const b = nodes[j];
      if (!isVisible(b)) continue;
      let dx = a.x - b.x, dy = a.y - b.y;
      let d2 = dx * dx + dy * dy;
      if (d2 < 1) d2 = 1;
      if (d2 > 500000) continue; // skip very far nodes
      const f = repulsion / d2;
      const fx = dx * f, fy = dy * f;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    }
  }

  // Attraction along edges
  for (const e of edges) {
    const a = nodeMap[e.src], b = nodeMap[e.tgt];
    if (!a || !b || !isVisible(a) || !isVisible(b)) continue;
    let dx = b.x - a.x, dy = b.y - a.y;
    let d = Math.sqrt(dx * dx + dy * dy) || 1;
    const f = (d - linkDist) * attraction;
    const fx = (dx / d) * f, fy = (dy / d) * f;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  }

  // Center gravity
  for (let i = 0; i < N; i++) {
    const a = nodes[i];
    if (!isVisible(a)) continue;
    a.vx -= a.x * 0.0003;
    a.vy -= a.y * 0.0003;
  }

  // Integration
  for (let i = 0; i < N; i++) {
    const a = nodes[i];
    if (a.pinned) { a.vx = 0; a.vy = 0; continue; }
    a.vx *= damping; a.vy *= damping;
    a.x += a.vx * alpha;
    a.y += a.vy * alpha;
  }
}

function isVisible(node) {
  return layers[node.layer];
}

function isSearchMatch(node) {
  if (!searchTerm) return true;
  return node.id.toLowerCase().includes(searchTerm) ||
         node.label.toLowerCase().includes(searchTerm) ||
         (node.detail || '').toLowerCase().includes(searchTerm);
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(W / 2 + camX, H / 2 + camY);
  ctx.scale(camZ, camZ);

  // Edges
  for (const e of edges) {
    const a = nodeMap[e.src], b = nodeMap[e.tgt];
    if (!a || !b || !isVisible(a) || !isVisible(b)) continue;
    if (!layers[e.layer]) continue;
    const matchA = isSearchMatch(a), matchB = isSearchMatch(b);
    const dim = searchTerm && !matchA && !matchB;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = dim ? '#111' : (e.color || '#333');
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Nodes
  for (const n of nodes) {
    if (!isVisible(n)) continue;
    const match = isSearchMatch(n);
    const dim = searchTerm && !match;
    const r = n.r * (n === hoverNode ? 1.5 : 1);

    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = dim ? '#222' : n.color;
    ctx.globalAlpha = dim ? 0.15 : (n.layer === 'entities' ? 0.8 : 1);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Label (only when zoomed in enough or for hubs)
    if (camZ > 0.6 || n.layer === 'shapes' || n === hoverNode) {
      const fontSize = Math.max(4, Math.min(11, 9 / camZ));
      ctx.font = `${n.layer === 'shapes' ? 'bold ' : ''}${fontSize}px system-ui`;
      ctx.fillStyle = dim ? '#333' : '#ccc';
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y + r + fontSize + 1);
    }
  }

  ctx.restore();
}

// ── INTERACTION ───────────────────────────────────────────────────
let hoverNode = null, dragNode = null, isPanning = false, lastMouse = null;

function screenToWorld(sx, sy) {
  return [(sx - W / 2 - camX) / camZ, (sy - H / 2 - camY) / camZ];
}

function findNode(sx, sy) {
  const [wx, wy] = screenToWorld(sx, sy);
  let best = null, bestD = Infinity;
  for (const n of nodes) {
    if (!isVisible(n)) continue;
    const dx = n.x - wx, dy = n.y - wy;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < n.r * 1.5 && d < bestD) { best = n; bestD = d; }
  }
  return best;
}

canvas.addEventListener('mousedown', e => {
  const n = findNode(e.clientX, e.clientY);
  if (n) {
    dragNode = n;
    n.pinned = true;
  } else {
    isPanning = true;
  }
  lastMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mousemove', e => {
  if (dragNode && lastMouse) {
    const [wx, wy] = screenToWorld(e.clientX, e.clientY);
    dragNode.x = wx; dragNode.y = wy;
    dragNode.vx = 0; dragNode.vy = 0;
  } else if (isPanning && lastMouse) {
    camX += e.clientX - lastMouse.x;
    camY += e.clientY - lastMouse.y;
  }
  lastMouse = { x: e.clientX, y: e.clientY };

  // Hover
  const n = findNode(e.clientX, e.clientY);
  hoverNode = n;
  if (n) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
    tooltip.querySelector('.tt-id').textContent = n.id;
    tooltip.querySelector('.tt-label').textContent = n.label;
    tooltip.querySelector('.tt-detail').textContent = n.detail || n.layer;
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = isPanning ? 'grabbing' : 'default';
  }
});

canvas.addEventListener('mouseup', () => {
  dragNode = null; isPanning = false;
});

canvas.addEventListener('dblclick', e => {
  const n = findNode(e.clientX, e.clientY);
  if (n) n.pinned = !n.pinned;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const scale = e.deltaY > 0 ? 0.92 : 1.08;
  camZ = Math.max(0.1, Math.min(5, camZ * scale));
}, { passive: false });

// Touch support
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const n = findNode(t.clientX, t.clientY);
    if (n) { dragNode = n; n.pinned = true; }
    else isPanning = true;
    lastMouse = { x: t.clientX, y: t.clientY };
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    if (dragNode) {
      const [wx, wy] = screenToWorld(t.clientX, t.clientY);
      dragNode.x = wx; dragNode.y = wy;
    } else if (isPanning && lastMouse) {
      camX += t.clientX - lastMouse.x;
      camY += t.clientY - lastMouse.y;
    }
    lastMouse = { x: t.clientX, y: t.clientY };
  }
}, { passive: true });
canvas.addEventListener('touchend', () => { dragNode = null; isPanning = false; });

// ── MAIN LOOP ─────────────────────────────────────────────────────
function loop() {
  tick();
  render();
  requestAnimationFrame(loop);
}

// ── LOAD DATA AND START ───────────────────────────────────────────
if (typeof GRAPH_DATA !== 'undefined') {
  buildGraph(GRAPH_DATA);
  loop();
}
</script>
</body>
</html>
